<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Login - VisiScure Order</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/logo.jpeg') }}">
    <link rel="shortcut icon" type="image/jpeg" href="{{ url_for('static', filename='images/logo.jpeg') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/font-awesome.min.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(2px);
        }

        body::before {
            width: 260px;
            height: 260px;
            top: -70px;
            left: -60px;
            background: rgba(255, 255, 255, 0.26);
        }

        body::after {
            width: 320px;
            height: 320px;
            right: -110px;
            bottom: -90px;
            background: rgba(255, 255, 255, 0.18);
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(9, 33, 82, 0.16);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.55);
        }
        
        .login-header {
            background: linear-gradient(135deg, #ff7e00 0%, #ff5500 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }
        
        .login-header i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .login-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            opacity: 0.95;
            font-size: 0.95rem;
        }
        
        .login-body {
            padding: 2.5rem 2rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #ddd;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: #1f2937;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ff7e00;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 126, 0, 0.12);
        }
        
        .alert {
            padding: 0.875rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
        
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .alert.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff7e00 0%, #ff5500 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 85, 0, 0.25);
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #f66e00 0%, #e64b00 100%);
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(255, 85, 0, 0.32);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.5rem;
        }
        
        .info-box p {
            color: #0c4a6e;
            font-size: 0.85rem;
            line-height: 1.6;
            display: flex;
            align-items: start;
            gap: 0.5rem;
        }
        
        .info-box i {
            color: #0284c7;
            margin-top: 0.2rem;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .login-container {
                max-width: 100%;
                border-radius: 18px;
            }
            
            .login-header {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.55rem;
            }
            
            .login-body {
                padding: 2rem 1.5rem;
            }

            .login-btn {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-fire-burner"></i>
            <h1>Kitchen Login</h1>
            <p>Enter your Kitchen ID and Name</p>
        </div>
        
        <div class="login-body">
            <div id="alert" class="alert"></div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="kitchen-id">
                        <i class="fas fa-id-card"></i> Kitchen ID
                    </label>
                    <input 
                        type="number" 
                        id="kitchen-id" 
                        name="kitchen_id" 
                        placeholder="e.g., 101" 
                        min="1"
                        step="1"
                        inputmode="numeric"
                        pattern="[0-9]+"
                        required
                        autocomplete="off"
                    >
                </div>
                
                <div class="form-group">
                    <label for="kitchen-name">
                        <i class="fas fa-utensils"></i> Kitchen Name
                    </label>
                    <input 
                        type="text" 
                        id="kitchen-name" 
                        name="kitchen_name" 
                        placeholder="e.g., Veg Kitchen" 
                        required
                        autocomplete="off"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login to Kitchen
                </button>
            </form>
            
            <div class="info-box">
                <p>
                    <i class="fas fa-info-circle"></i>
                    <span>Your numeric Kitchen ID and Kitchen Name are provided by the manager. Both must match exactly to login.</span>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const kitchenIdRaw = document.getElementById('kitchen-id').value.trim();
            const kitchenName = document.getElementById('kitchen-name').value.trim();
            const loginBtn = document.getElementById('login-btn');
            const alert = document.getElementById('alert');

            if (!/^\d+$/.test(kitchenIdRaw)) {
                alert.className = 'alert error';
                alert.textContent = 'Kitchen ID must contain numbers only.';
                alert.style.display = 'block';
                return;
            }

            const kitchenId = Number(kitchenIdRaw);
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            // Hide previous alerts
            alert.style.display = 'none';
            
            fetch('/kitchen/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    kitchen_id: kitchenId,
                    kitchen_name: kitchenName
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert.className = 'alert success';
                    alert.textContent = data.message;
                    alert.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 500);
                } else {
                    alert.className = 'alert error';
                    alert.textContent = data.message;
                    alert.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Kitchen';
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                alert.className = 'alert error';
                alert.textContent = 'An error occurred. Please try again.';
                alert.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Kitchen';
            });
        }
    </script>
</body>
</html>

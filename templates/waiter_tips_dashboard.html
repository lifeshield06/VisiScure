<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tips - VisiScure Order</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/logo.jpeg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/manager.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Page Title -->
        <div class="page-title-section">
            <div class="page-title-left">
                <i class="fas fa-hand-holding-heart page-icon"></i>
                <h1 class="page-title">My Tips</h1>
            </div>
            <div class="page-subtitle">View your tip earnings and history</div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons" style="margin-bottom: 2rem;">
            <button class="btn btn-primary" onclick="loadTipStatistics()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <a href="/waiter/dashboard" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <!-- Main Content -->
        <div id="mainContent">
            <div style="text-align: center; padding: 3rem; color: #9ca3af;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <p>Loading tips...</p>
            </div>
        </div>
    </div>

    <script>
        const waiterId = {{ waiter_id }};
        document.addEventListener('DOMContentLoaded', () => loadTipStatistics());

        async function loadTipStatistics() {
            try {
                const response = await fetch('/waiter/api/tip-statistics');
                const data = await response.json();
                if (data.success) {
                    data.tips_visible === false ? renderTipsHidden() : renderTipsDashboard(data);
                } else {
                    renderError(data.message || 'Failed to load tips');
                }
            } catch (error) {
                renderError('Failed to load tips data');
            }
        }

        function renderTipsHidden() {
            document.getElementById('mainContent').innerHTML = `
                <div class="card" style="text-align: center; padding: 3rem;">
                    <i class="fas fa-eye-slash" style="font-size: 4rem; color: #d1d5db; margin-bottom: 1rem;"></i>
                    <h3 style="color: #374151; margin-bottom: 0.5rem;">Tips Information Hidden</h3>
                    <p style="color: #6b7280;">Your manager has disabled tip visibility</p>
                </div>`;
        }

        function renderTipsDashboard(data) {
            const {today_tips = 0, week_tips = 0, month_tips = 0, total_tips = 0, recent_tips = []} = data;
            document.getElementById('mainContent').innerHTML = `
                <!-- Summary Cards -->
                <div class="stats-grid" style="margin-bottom: 2rem;">
                    <div class="stat-card">
                        <div class="stat-value">₹${Math.round(total_tips)}</div>
                        <div class="stat-label">Total Tips Earned</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">₹${Math.round(today_tips)}</div>
                        <div class="stat-label">Today's Tips</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">₹${Math.round(week_tips)}</div>
                        <div class="stat-label">This Week</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">₹${Math.round(month_tips)}</div>
                        <div class="stat-label">This Month</div>
                    </div>
                </div>

                <!-- Tips Table -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-history"></i>
                            My Tip History
                        </div>
                        <button class="btn btn-primary" onclick="loadTipStatistics()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    ${recent_tips.length > 0 ? `
                        <table class="data-table">
                            <thead>
                                <tr style="background: #f59e0b;">
                                    <th>Table</th>
                                    <th>Bill Number</th>
                                    <th>Date & Time</th>
                                    <th>Tip Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${recent_tips.map(tip => `
                                    <tr>
                                        <td><span class="badge badge-primary">T${tip.table_number || '?'}</span></td>
                                        <td><span class="badge badge-secondary"><i class="fas fa-receipt"></i> ${tip.bill_number || 'N/A'}</span></td>
                                        <td style="color: #6b7280; font-size: 0.875rem;">${formatDate(tip.date)}</td>
                                        <td><span style="font-weight: 700; color: #10b981; font-size: 1.125rem;">₹${Math.round(tip.amount)}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div class="table-footer" style="background: #fef3c7; padding: 1rem; font-weight: 600;">
                            <i class="fas fa-wallet"></i> TOTAL: ₹${Math.round(recent_tips.reduce((sum, tip) => sum + tip.amount, 0))}
                        </div>
                    ` : `
                        <div style="text-align: center; padding: 3rem; color: #9ca3af;">
                            <i class="fas fa-hand-holding-heart" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                            <p>No tips received yet</p>
                        </div>
                    `}
                </div>`;
        }

        function renderError(message) {
            document.getElementById('mainContent').innerHTML = `
                <div class="card" style="text-align: center; padding: 3rem;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem;"></i>
                    <p style="color: #6b7280;">${message}</p>
                    <button class="btn btn-primary" onclick="loadTipStatistics()" style="margin-top: 1rem;">
                        <i class="fas fa-sync-alt"></i> Try Again
                    </button>
                </div>`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Unknown';
            const date = new Date(dateStr);
            const day = String(date.getDate()).padStart(2, '0');
            const month = date.toLocaleString('en-IN', { month: 'short' });
            const year = date.getFullYear();
            const time = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
            return `${day}/${month}/${year} ${time}`;
        }
    </script>
</body>
</html>
